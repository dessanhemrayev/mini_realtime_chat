[pytest]
# Минимальная версия pytest
minversion = 7.0

# Директория с тестами
testpaths = tests

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Настройки asyncio
asyncio_mode = auto

# Опции по умолчанию
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml

# Маркеры
markers =
    asyncio: тесты асинхронного кода
    slow: медленные тесты
    integration: интеграционные тесты
    unit: юнит тесты

# Исключения из покрытия
[coverage:run]
omit =
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
