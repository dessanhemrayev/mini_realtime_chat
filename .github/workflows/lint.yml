name: Lint and Code Quality

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 pylint mypy

    - name: Check code formatting with Black
      run: black --check app tests

    - name: Check import sorting with isort
      run: isort --check-only app tests

    - name: Lint with flake8
      run: flake8 app tests --max-line-length=120 --extend-ignore=E203,W503

    - name: Type checking with mypy
      run: mypy app --ignore-missing-imports --no-implicit-optional
      continue-on-error: true

    - name: Analyze code with Pylint
      run: pylint app --fail-under=8.0 --disable=missing-docstring
      continue-on-error: true
