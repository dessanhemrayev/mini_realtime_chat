<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Чат</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                background: #f5f5f5;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 1rem;
            }
            
            .chat-container {
                background: white;
                width: 100%;
                max-width: 600px;
                height: 90vh;
                max-height: 700px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            
            .chat-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 1rem;
                text-align: center;
                border-bottom: 1px solid #ddd;
            }
            
            .chat-header h1 {
                margin: 0 0 0.25rem 0;
                font-size: 1.5rem;
            }
            
            .chat-header p {
                margin: 0;
                font-size: 0.9rem;
                opacity: 0.9;
            }
            
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 1rem;
                list-style: none;
            }
            
            .message {
                margin-bottom: 1rem;
                padding: 0.75rem;
                border-radius: 5px;
                animation: slideIn 0.3s ease-in-out;
            }
            
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .message.user {
                background: #e8f0fe;
                margin-left: 2rem;
                border-left: 3px solid #667eea;
            }
            
            .message.other {
                background: #f0f0f0;
                margin-right: 2rem;
                border-left: 3px solid #999;
            }
            
            .message.system {
                background: #fffacd;
                text-align: center;
                font-size: 0.9rem;
                color: #666;
                margin-left: 0;
                margin-right: 0;
            }
            
            .message-author {
                font-weight: 600;
                color: #667eea;
                margin-bottom: 0.25rem;
                font-size: 0.9rem;
            }
            
            .message.other .message-author {
                color: #666;
            }
            
            .message.system .message-author {
                display: none;
            }
            
            .message-text {
                word-wrap: break-word;
                margin-bottom: 0.25rem;
            }
            
            .message-time {
                font-size: 0.8rem;
                color: #999;
            }
            
            .chat-input-container {
                border-top: 1px solid #ddd;
                padding: 1rem;
                background: white;
                display: flex;
                gap: 0.5rem;
            }
            
            #messageText {
                flex: 1;
                padding: 0.75rem;
                border: 2px solid #e0e0e0;
                border-radius: 5px;
                font-size: 1rem;
                font-family: inherit;
                resize: none;
                max-height: 100px;
            }
            
            #messageText:focus {
                outline: none;
                border-color: #667eea;
            }
            
            button {
                padding: 0.75rem 1.5rem;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-weight: 600;
                transition: transform 0.2s;
                white-space: nowrap;
            }
            
            button:hover {
                transform: translateY(-2px);
            }
            
            button:active {
                transform: translateY(0);
            }
            
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            
            .status {
                position: fixed;
                top: 1rem;
                right: 1rem;
                padding: 0.75rem 1rem;
                border-radius: 5px;
                color: white;
                display: none;
                font-size: 0.9rem;
            }
            
            .status.connected {
                background: #4caf50;
                display: block;
            }
            
            .status.disconnected {
                background: #f44336;
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="status" id="status">Подключение...</div>
        
        <div class="chat-container">
            <div class="chat-header">
                <h1>💬 Чат</h1>
                <p>Ваш ID: <span id="ws-id">-</span></p>
            </div>
            
            <ul id="messages"></ul>
            
            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="messageText" 
                    placeholder="Введите сообщение..." 
                    autocomplete="off"
                    maxlength="5000"
                />
                <button onclick="sendMessage()" id="sendBtn">Отправить</button>
            </div>
        </div>

        <script>
            const url = window.location.pathname;
            const ids = url.split('/');
            const clientId = ids[3];
            const roomId = ids[2];
            const host = window.location.host;
            
            document.querySelector("#ws-id").textContent = clientId;
            
            const statusDiv = document.getElementById("status");
            const messagesDiv = document.getElementById("messages");
            const messageInput = document.getElementById("messageText");
            const sendBtn = document.getElementById("sendBtn");
            
            let ws = null;
            
            function connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${host}/ws${url}`);
                
                ws.onopen = function() {
                    statusDiv.className = "status connected";
                    statusDiv.textContent = "✓ Подключено";
                    sendBtn.disabled = false;
                };
                
                ws.onmessage = function(event) {
                    const message = document.createElement('li');
                    message.className = 'message';
                    
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'system') {
                            message.className += ' system';
                            message.innerHTML = `<span class="message-text">${escapeHtml(data.message)}</span>`;
                        } else {
                            const isOwnMessage = data.author.author_id === clientId;
                            message.className += isOwnMessage ? ' user' : ' other';
                            
                            message.innerHTML = `
                                <div class="message-author">${escapeHtml(data.author.name)}</div>
                                <div class="message-text">${escapeHtml(data.text)}</div>
                                <div class="message-time">${data.day} ${data.time}</div>
                            `;
                        }
                    } catch (e) {
                        message.className += ' system';
                        message.innerHTML = `<span class="message-text">${escapeHtml(event.data)}</span>`;
                    }
                    
                    messagesDiv.appendChild(message);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                };
                
                ws.onerror = function() {
                    statusDiv.className = "status disconnected";
                    statusDiv.textContent = "✗ Ошибка подключения";
                    sendBtn.disabled = true;
                };
                
                ws.onclose = function() {
                    statusDiv.className = "status disconnected";
                    statusDiv.textContent = "✗ Отключено";
                    sendBtn.disabled = true;
                    setTimeout(connectWebSocket, 3000);
                };
            }
            
            function sendMessage() {
                const text = messageInput.value.trim();
                
                if (!text) {
                    return;
                }
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const data = {
                        text: text,
                        name: clientId
                    };
                    ws.send(JSON.stringify(data));
                    messageInput.value = '';
                    messageInput.focus();
                }
            }
            
            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Инициализация
            connectWebSocket();
        </script>
    </body>
</html>
